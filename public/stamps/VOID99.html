<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="../etc-icon.svg">
    <link rel="icon" type="image/png" sizes="256x256" href="../etc-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voidwalk — VANGO Stamp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cover: #6E1423; --cover-2: #3E0A14; --paper: #EDE3CF;
      --ink: #2B2418; --ink-soft: #5A5240; --accent: #F2C14E;
      font-family: 'Space Mono', 'Courier New', monospace;
    }
    body {
      min-height: 100svh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 25% 20%, rgba(110,20,35,0.3) 0%, transparent 55%),
                  radial-gradient(ellipse at 75% 80%, rgba(62,10,20,0.35) 0%, transparent 50%),
                  linear-gradient(160deg, #0E0A06 0%, #1A1008 50%, #0B0D1A 100%);
      padding: 24px;
    }
    .card {
      background: var(--paper); border-radius: 20px; padding: 36px 32px 32px;
      max-width: 380px; width: 100%; text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    .eyebrow {
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--cover); margin-bottom: 20px; opacity: 0.8;
    }
    .qr-wrap {
      display: inline-block; padding: 12px; background: #EDE3CF;
      border: 1.5px solid rgba(110,20,35,0.2); border-radius: 10px;
      margin-bottom: 22px;
    }
    .qr-wrap svg { display: block; width: 180px; height: 180px; }
    .stamp-code {
      font-size: 10px; letter-spacing: 2px; color: var(--ink-soft);
      margin-bottom: 16px;
    }
    .title {
      font-family: Georgia, serif; font-size: 22px; font-weight: 700;
      color: var(--ink); margin-bottom: 6px; font-style: italic;
    }
    .artist { font-size: 12px; color: var(--ink-soft); margin-bottom: 4px; }
    .venue  { font-size: 11px; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 28px; }
    .rule { width: 40px; height: 1.5px; background: rgba(110,20,35,0.3); margin: 0 auto 24px; }
    .cta {
      display: inline-block; background: var(--cover); color: #EDE3CF;
      font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; text-decoration: none; padding: 12px 24px;
      border-radius: 8px; transition: filter 0.15s;
    }
    .cta:hover { filter: brightness(1.12); }
    .hint { font-size: 10px; color: var(--ink-soft); margin-top: 14px; line-height: 1.5; }
    @media print {
      body { background: white; padding: 0; }
      .card { box-shadow: none; border: 1px solid #ccc; }
      .cta { display: none; }
    }
  </style>
</head>
